<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foto &amp; Video — Carmela &amp; Luigi</title>
  <meta name="description" content="Condividi i tuoi scatti del matrimonio di Carmela e Luigi." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Cinzel:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    h2{text-align:center;margin-bottom:1.25rem}

    /* ── Upload ── */
    .upload-section{padding:clamp(2rem,5vw,3rem) 0 1.5rem}
    .upload-card{background:var(--color-surface);border:2px dashed var(--color-border);border-radius:var(--radius-xl);padding:2.5rem 1.5rem;text-align:center;transition:border-color .2s,background .2s}
    .upload-card.dragover{border-color:var(--color-primary);background:var(--color-primary-soft)}
    .upload-icon{font-size:2.8rem;margin-bottom:.6rem}
    .upload-hint{font-size:var(--text-sm);color:var(--color-text-faint);margin-top:.9rem}
    .upload-label{display:inline-flex;align-items:center;gap:.6rem;min-height:56px;padding:1rem 2.2rem;margin-top:.75rem;border-radius:var(--radius-full);background:var(--color-primary);color:var(--color-text-inverse);font-weight:700;font-size:var(--text-lg);cursor:pointer;transition:background .2s;-webkit-tap-highlight-color:transparent}
    .upload-label:hover{background:var(--color-primary-hover)}
    .upload-label svg{width:22px;height:22px;flex-shrink:0}
    #file-input{position:absolute;width:1px;height:1px;opacity:0;pointer-events:none}

    /* ── Progress ── */
    #progress-area{margin-top:1.25rem;display:grid;gap:.85rem;text-align:left}
    .progress-item{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:.85rem 1rem;display:grid;gap:.35rem}
    .progress-name{font-size:var(--text-sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .progress-bar-wrap{height:6px;border-radius:var(--radius-full);background:var(--color-surface-2);overflow:hidden}
    .progress-bar{height:100%;border-radius:var(--radius-full);background:var(--color-primary);transition:width .15s;width:0%}
    .progress-status{font-size:var(--text-xs);color:var(--color-text-muted)}
    .progress-status.done{color:#5a8a5a}
    .progress-status.error{color:#c0392b}

    /* ── Gallery ── */
    .gallery-section{padding:1rem 0 2rem}
    .gallery-filters{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap;justify-content:center}
    .filter-btn{min-height:38px;padding:.45rem 1.1rem;border-radius:var(--radius-full);border:1px solid var(--color-border);background:var(--color-surface);color:var(--color-text-muted);font-size:var(--text-sm);font-weight:600;transition:all .2s}
    .filter-btn.active,.filter-btn:hover{background:var(--color-primary);border-color:var(--color-primary);color:var(--color-text-inverse)}
    .gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.6rem}
    @media(min-width:600px){.gallery-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.85rem}}
    .gallery-item{aspect-ratio:1;border-radius:var(--radius-lg);overflow:hidden;cursor:pointer;position:relative;background:var(--color-surface-2);box-shadow:var(--shadow-sm)}
    .gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
    .gallery-item:hover img{transform:scale(1.05)}
    .gallery-item video{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block}
    .gallery-item:hover video{transform:scale(1.05)}
    .video-badge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.22);pointer-events:none}
    .video-badge svg{width:42px;height:42px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
    .gallery-empty{text-align:center;padding:3rem 1rem;color:var(--color-text-faint);grid-column:1/-1}
    .gallery-empty-icon{font-size:3rem;margin-bottom:.5rem}
    .gallery-loading{text-align:center;padding:2rem;color:var(--color-text-faint);grid-column:1/-1;font-size:var(--text-sm)}

    /* ── Lightbox ── */
    .lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
    .lightbox.open{opacity:1;pointer-events:all}
    .lightbox-inner{position:relative;max-width:min(95vw,1000px);max-height:90vh;display:flex;align-items:center;justify-content:center}
    .lightbox-inner img{max-width:100%;max-height:90vh;border-radius:var(--radius-md);object-fit:contain}
    .lightbox-inner video{max-width:100%;max-height:90vh;border-radius:var(--radius-md)}
    .lb-btn{width:44px;height:44px;border-radius:var(--radius-full);background:rgba(255,255,255,.14);border:none;color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background .2s;cursor:pointer;flex-shrink:0}
    .lb-btn:hover{background:rgba(255,255,255,.26)}
    .lb-topbar{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;justify-content:space-between;align-items:center;padding:.6rem .75rem;background:linear-gradient(rgba(0,0,0,.55),transparent);pointer-events:none}
    .lb-topbar>*{pointer-events:all}
    #lb-counter{color:rgba(255,255,255,.85);font-size:var(--text-sm);background:rgba(0,0,0,.35);padding:.25rem .8rem;border-radius:var(--radius-full);backdrop-filter:blur(8px)}
    #lb-prev{position:fixed;top:50%;left:.75rem;transform:translateY(-50%)}
    #lb-next{position:fixed;top:50%;right:.75rem;transform:translateY(-50%)}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img class="wreath-heart" src="wreath-heart.png" alt="Logo matrimonio" />
        <div class="brand-text"><strong>Carmela &amp; Luigi</strong></div>
      </a>
    </div>
  </header>

  <main>
    <section class="upload-section">
      <div class="container">
        <span class="eyebrow">21 luglio 2026</span>
        <h2>Condividi i tuoi scatti</h2>
        <div class="upload-card" id="drop-zone">
          <div class="upload-icon">📷</div>
          <p style="color:var(--color-text-muted)">Foto e video dal tuo smartphone</p>
          <label class="upload-label" for="file-input">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Carica
          </label>
          <input id="file-input" type="file" accept="image/*,video/*" multiple>
          <p class="upload-hint">Puoi selezionare più file contemporaneamente</p>
        </div>
        <div id="progress-area"></div>
      </div>
    </section>

    <section class="gallery-section">
      <div class="container">
        <h2>I vostri ricordi</h2>
        <div class="gallery-filters">
          <button class="filter-btn active" data-filter="all">Tutti</button>
          <button class="filter-btn" data-filter="image">Foto</button>
          <button class="filter-btn" data-filter="video">Video</button>
        </div>
        <div class="gallery-grid" id="gallery-grid">
          <div class="gallery-loading">Caricamento galleria…</div>
        </div>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visualizzatore media">
    <div class="lb-topbar">
      <div id="lb-counter"></div>
      <button class="lb-btn" id="lb-close" aria-label="Chiudi">✕</button>
    </div>
    <button class="lb-btn" id="lb-prev" aria-label="Precedente">‹</button>
    <div class="lightbox-inner" id="lb-inner"></div>
    <button class="lb-btn" id="lb-next" aria-label="Successivo">›</button>
  </div>

  <nav class="site-nav" aria-label="Navigazione principale">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#contatti">Contatti</a></li>
      <li><a href="foto.html" class="active">Foto</a></li>
      <li><button class="theme-toggle" data-theme-toggle aria-label="Cambia tema">☾</button></li>
    </ul>
  </nav>

  <footer class="site-footer">
    <div class="container"><p>Carmela &amp; Luigi</p></div>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/theme.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDXs5j6iXN6bmyqvG0zzwEKRli5Hq343lM",
      authDomain: "sitomatrimonio-7e66e.firebaseapp.com",
      projectId: "sitomatrimonio-7e66e",
      storageBucket: "sitomatrimonio-7e66e.firebasestorage.app",
      messagingSenderId: "935471034954",
      appId: "1:935471034954:web:b428ee9682a35bd557ecb3"
    });
    const storage = firebase.storage();
    const db      = firebase.firestore();

    let items         = [];
    let filtered      = [];
    let currentFilter = 'all';
    let lbIdx         = -1;

    async function loadGallery() {
      try {
        const snap = await db.collection('uploads').orderBy('createdAt', 'desc').get();
        items = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      } catch(e) {
        console.error('Gallery load error:', e);
      }
      renderGallery();
    }

    function renderGallery() {
      const grid = document.getElementById('gallery-grid');
      filtered = currentFilter === 'all' ? [...items] : items.filter(i => i.type === currentFilter);

      if (!filtered.length) {
        grid.innerHTML = `<div class="gallery-empty"><div class="gallery-empty-icon">🌸</div><p>Nessuno scatto ancora.<br>Sii il primo a condividere!</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map((item, idx) => {
        if (item.type === 'image') {
          return `<div class="gallery-item" data-idx="${idx}" role="button" tabindex="0" aria-label="Foto">
            <img src="${item.thumbUrl || item.url}" alt="Foto matrimonio" loading="lazy">
          </div>`;
        } else {
          return `<div class="gallery-item" data-idx="${idx}" role="button" tabindex="0" aria-label="Video">
            <video src="${item.url}" preload="none" muted playsinline data-thumb></video>
            <div class="video-badge">
              <svg viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
          </div>`;
        }
      }).join('');

      grid.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', () => openLb(+el.dataset.idx));
        el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') openLb(+el.dataset.idx); });
      });

      grid.querySelectorAll('video[data-thumb]').forEach(setupVideoThumb);
    }

    const thumbObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const vid = entry.target;
        thumbObserver.unobserve(vid);
        vid.preload = 'metadata';
        vid.addEventListener('loadedmetadata', () => { vid.currentTime = 0.001; }, { once: true });
      });
    }, { rootMargin: '200px' });

    function setupVideoThumb(vid) { thumbObserver.observe(vid); }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderGallery();
      });
    });

    const fileInput    = document.getElementById('file-input');
    const progressArea = document.getElementById('progress-area');
    const dropZone     = document.getElementById('drop-zone');

    fileInput.addEventListener('change', () => processFiles(fileInput.files));
    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', ()  => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      processFiles(e.dataTransfer.files);
    });

    function compressImage(file, maxPx = 1920, quality = 0.82) {
      return new Promise(resolve => {
        if (!file.type.startsWith('image/')) { resolve(file); return; }
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width <= maxPx && height <= maxPx) { resolve(file); return; }
            if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
            else                { width  = Math.round(width  * maxPx / height); height = maxPx; }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(
              blob => resolve(new File([blob], file.name, { type: 'image/jpeg' })),
              'image/jpeg', quality
            );
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function processFiles(files) {
      for (const file of files) await uploadFile(file);
      fileInput.value = '';
    }

    async function uploadFile(file) {
      const uid = 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
      const shortName = file.name.length > 32 ? file.name.slice(0, 30) + '…' : file.name;

      const el = document.createElement('div');
      el.className = 'progress-item';
      el.innerHTML = `
        <div class="progress-name">${shortName}</div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="bar-${uid}"></div></div>
        <div class="progress-status" id="st-${uid}">Ottimizzazione…</div>`;
      progressArea.prepend(el);

      const bar = () => document.getElementById(`bar-${uid}`);
      const st  = () => document.getElementById(`st-${uid}`);

      const isImage = file.type.startsWith('image/');
      const ts = Date.now();
      const path      = `matrimonio/${ts}_${file.name}`;
      const thumbPath = `matrimonio/thumbs/${ts}_${file.name}`;

      let fullFile = file, thumbPromise = Promise.resolve(null);
      if (isImage) {
        [fullFile] = await Promise.all([compressImage(file, 1920, 0.82)]);
        const thumbFile = await compressImage(file, 500, 0.7);
        // Avvia upload thumbnail in parallelo (nessuna barra dedicata, è piccola)
        thumbPromise = storage.ref(thumbPath).put(thumbFile)
          .then(snap => snap.ref.getDownloadURL())
          .catch(() => null);
      }

      if (st()) st().textContent = 'In caricamento…';
      const task = storage.ref(path).put(fullFile);

      return new Promise(resolve => {
        task.on('state_changed',
          snapshot => {
            const pct = Math.round(snapshot.bytesTransferred / snapshot.totalBytes * 100);
            if (bar()) bar().style.width = pct + '%';
            if (st())  st().textContent  = pct + '%';
          },
          error => {
            console.error('Upload error:', error);
            if (st()) { st().textContent = '✗ Errore nel caricamento'; st().className = 'progress-status error'; }
            resolve();
          },
          async () => {
            try {
              const [url, thumbUrl] = await Promise.all([
                task.snapshot.ref.getDownloadURL(),
                thumbPromise
              ]);
              const type = isImage ? 'image' : 'video';
              await db.collection('uploads').add({
                url, thumbUrl: thumbUrl || null,
                type, name: file.name, path,
                thumbPath: isImage ? thumbPath : null,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
              });
              if (bar()) bar().style.width = '100%';
              if (st())  { st().textContent = '✓ Caricato!'; st().className = 'progress-status done'; }
              items.unshift({ url, thumbUrl, type, name: file.name, createdAt: null });
              renderGallery();
            } catch(e) {
              console.error('Firestore error:', e);
              if (st()) { st().textContent = '✗ Errore nel salvataggio'; st().className = 'progress-status error'; }
            }
            resolve();
          }
        );
      });
    }

    const lightbox = document.getElementById('lightbox');
    const lbInner  = document.getElementById('lb-inner');
    const lbCtr    = document.getElementById('lb-counter');

    function openLb(idx) {
      lbIdx = idx;
      renderLb();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lbInner.innerHTML = '';
    }
    function renderLb() {
      const item = filtered[lbIdx];
      lbInner.innerHTML = '';
      if (item.type === 'image') {
        const img = document.createElement('img');
        img.src = item.url; img.alt = 'Foto matrimonio';
        lbInner.appendChild(img);
      } else {
        const vid = document.createElement('video');
        vid.src = item.url; vid.controls = true; vid.autoplay = true; vid.playsInline = true;
        lbInner.appendChild(vid);
      }
      lbCtr.textContent = `${lbIdx + 1} / ${filtered.length}`;
      document.getElementById('lb-prev').style.visibility = lbIdx === 0 ? 'hidden' : '';
      document.getElementById('lb-next').style.visibility = lbIdx === filtered.length - 1 ? 'hidden' : '';
    }

    document.getElementById('lb-close').addEventListener('click', closeLb);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLb(); });
    document.getElementById('lb-prev').addEventListener('click', () => { if (lbIdx > 0) { lbIdx--; renderLb(); } });
    document.getElementById('lb-next').addEventListener('click', () => { if (lbIdx < filtered.length - 1) { lbIdx++; renderLb(); } });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')    closeLb();
      if (e.key === 'ArrowLeft'  && lbIdx > 0)                   { lbIdx--; renderLb(); }
      if (e.key === 'ArrowRight' && lbIdx < filtered.length - 1) { lbIdx++; renderLb(); }
    });

    let txStart = 0;
    lightbox.addEventListener('touchstart', e => { txStart = e.changedTouches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend',   e => {
      const dx = e.changedTouches[0].clientX - txStart;
      if (Math.abs(dx) < 50) return;
      if (dx < 0 && lbIdx < filtered.length - 1) { lbIdx++; renderLb(); }
      if (dx > 0 && lbIdx > 0)                    { lbIdx--; renderLb(); }
    }, { passive: true });

    loadGallery();
  </script>
</body>
</html>

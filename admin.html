<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'));</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Carmela &amp; Luigi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:wght@400;500;600;700&family=Cinzel:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    [hidden]{display:none!important}

    /* ── Login ── */
    .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .login-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:2.5rem;width:min(100%,380px);box-shadow:var(--shadow-lg)}
    .login-logo{text-align:center;margin-bottom:.5rem;font-family:var(--font-script);font-size:2rem;color:var(--color-primary)}
    .login-subtitle{font-family:var(--font-smallcaps);letter-spacing:.1em;text-transform:uppercase;text-align:center;font-size:var(--text-xs);color:var(--color-text-muted);margin-bottom:2rem}
    .login-form{display:grid;gap:1rem}
    .login-field{display:grid;gap:.4rem}
    .login-field label{font-weight:600;font-size:var(--text-sm)}
    .login-field input{min-height:48px;padding:.9rem 1rem;border-radius:var(--radius-md);border:1px solid var(--color-border);background:var(--color-bg);color:var(--color-text);width:100%}
    .login-field input:focus{outline:2px solid var(--color-primary);outline-offset:2px;border-color:transparent}
    .pw-wrap{position:relative}
    .pw-wrap input{padding-right:3rem}
    .pw-toggle{position:absolute;right:.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.1rem;line-height:1;padding:.25rem;color:var(--color-text-muted);opacity:.6}
    .pw-toggle:hover{opacity:1}
    .login-remember{display:flex;align-items:center;gap:.5rem;font-size:var(--text-sm);cursor:pointer;user-select:none}
    .login-remember input{width:16px;height:16px;accent-color:var(--color-primary);cursor:pointer}
    .login-error{color:#c0392b;font-size:var(--text-sm);text-align:center;min-height:1.4em}

    /* ── Admin header ── */
    .admin-header{position:sticky;top:0;z-index:100;background:color-mix(in srgb,var(--color-bg) 92%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--color-divider);padding:.85rem 0}
    .admin-header-inner{display:flex;justify-content:space-between;align-items:center}
    .admin-brand{font-family:var(--font-script);font-size:1.6rem;color:var(--color-primary);line-height:1}
    .admin-brand small{display:block;font-family:var(--font-smallcaps);font-size:var(--text-xs);letter-spacing:.1em;text-transform:uppercase;color:var(--color-text-muted);margin-top:.1rem}
    .admin-actions{display:flex;align-items:center;gap:1rem}
    .admin-count{font-size:var(--text-sm);color:var(--color-text-faint)}

    /* ── Grid ── */
    .admin-main{padding:2rem 0 4rem}
    .admin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.75rem}
    @media(min-width:600px){.admin-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem}}
    .admin-item{aspect-ratio:1;border-radius:var(--radius-lg);overflow:hidden;position:relative;background:var(--color-surface-2);box-shadow:var(--shadow-sm);transition:opacity .3s;cursor:pointer}
    .admin-item img,.admin-item video{width:100%;height:100%;object-fit:cover}
    .admin-overlay{position:absolute;inset:0;background:rgba(0,0,0,0);display:flex;align-items:flex-start;justify-content:flex-end;padding:.5rem;transition:background .2s}
    .admin-item:hover .admin-overlay{background:rgba(0,0,0,.4)}
    .delete-btn{width:36px;height:36px;border-radius:var(--radius-full);background:rgba(180,30,20,.9);border:none;color:#fff;font-size:1rem;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;flex-shrink:0;line-height:1}
    .admin-item:hover .delete-btn{opacity:1}
    .delete-btn:hover{background:rgba(220,40,20,1)}
    .video-tag{position:absolute;bottom:.5rem;left:.5rem;background:rgba(0,0,0,.6);border-radius:var(--radius-full);padding:.15rem .55rem;font-size:var(--text-xs);color:#fff;pointer-events:none}
    .admin-item.deleting{opacity:.3;pointer-events:none}
    .admin-empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--color-text-faint);font-size:var(--text-sm)}

    /* ── Lightbox ── */
    .lightbox{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.93);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
    .lightbox.open{opacity:1;pointer-events:all}
    .lightbox-inner{position:relative;max-width:min(95vw,1000px);max-height:90vh;display:flex;align-items:center;justify-content:center}
    .lightbox-inner img{max-width:100%;max-height:90vh;border-radius:var(--radius-md);object-fit:contain}
    .lightbox-inner video{max-width:100%;max-height:90vh;border-radius:var(--radius-md)}
    .lb-btn{position:fixed;width:44px;height:44px;border-radius:var(--radius-full);background:rgba(255,255,255,.14);border:none;color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background .2s;cursor:pointer}
    .lb-btn:hover{background:rgba(255,255,255,.26)}
    #lb-close{top:1rem;right:1rem;font-size:1.2rem}
    #lb-prev{top:50%;left:.75rem;transform:translateY(-50%)}
    #lb-next{top:50%;right:.75rem;transform:translateY(-50%)}
    #lb-counter{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:var(--text-sm);background:rgba(0,0,0,.4);padding:.35rem .9rem;border-radius:var(--radius-full);backdrop-filter:blur(8px)}
  </style>
</head>
<body>

  <!-- ── Login ──────────────────────────────────────────────────────────── -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="login-logo">Carmela &amp; Luigi</div>
      <p class="login-subtitle">Amministrazione</p>
      <div class="login-form">
        <div class="login-field">
          <label for="u">Email</label>
          <input id="u" type="email" autocomplete="email">
        </div>
        <div class="login-field">
          <label for="p">Password</label>
          <div class="pw-wrap">
            <input id="p" type="password" autocomplete="current-password">
            <button type="button" id="pw-toggle" class="pw-toggle" aria-label="Mostra password">👁</button>
          </div>
        </div>
        <label class="login-remember">
          <input type="checkbox" id="remember"> Ricordami
        </label>
        <p class="login-error" id="login-error" aria-live="polite"></p>
        <button id="login-btn" class="btn btn-primary" style="width:100%">Accedi</button>
      </div>
    </div>
  </div>

  <!-- ── Admin panel ────────────────────────────────────────────────────── -->
  <div id="admin-panel" hidden>
    <header class="admin-header">
      <div class="container admin-header-inner">
        <div class="admin-brand">
          Carmela &amp; Luigi
          <small>Amministrazione galleria</small>
        </div>
        <div class="admin-actions">
          <span class="admin-count" id="admin-count"></span>
          <button class="btn" id="gen-thumbs-btn" style="border:1px solid var(--color-border)" title="Genera thumbnail mancanti">🖼</button>
          <button class="btn" id="refresh-btn" style="border:1px solid var(--color-border)" title="Aggiorna">↻</button>
          <button class="btn" id="logout-btn" style="border:1px solid var(--color-border)">Esci</button>
        </div>
      </div>
    </header>

    <main class="admin-main">
      <div class="container">
        <div class="admin-grid" id="admin-grid">
          <div class="admin-empty">Caricamento…</div>
        </div>
      </div>
    </main>
  </div>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visualizzatore media">
    <button class="lb-btn" id="lb-close" aria-label="Chiudi">✕</button>
    <button class="lb-btn" id="lb-prev" aria-label="Precedente">‹</button>
    <div class="lightbox-inner" id="lb-inner"></div>
    <button class="lb-btn" id="lb-next" aria-label="Successivo">›</button>
    <div id="lb-counter"></div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    const loginScreen = document.getElementById('login-screen');
    const adminPanel  = document.getElementById('admin-panel');

    let items = [], lbIdx = -1;

    // ── Firebase init ─────────────────────────────────────────────────────
    firebase.initializeApp({
      apiKey: "AIzaSyDXs5j6iXN6bmyqvG0zzwEKRli5Hq343lM",
      authDomain: "sitomatrimonio-7e66e.firebaseapp.com",
      projectId: "sitomatrimonio-7e66e",
      storageBucket: "sitomatrimonio-7e66e.firebasestorage.app",
      messagingSenderId: "935471034954",
      appId: "1:935471034954:web:b428ee9682a35bd557ecb3"
    });
    const auth    = firebase.auth();
    const db      = firebase.firestore();
    const storage = firebase.storage();

    // ── Auth state ────────────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
      if (user) {
        loginScreen.hidden = true;
        adminPanel.hidden  = false;
        loadGallery();
      } else {
        loginScreen.hidden = false;
        adminPanel.hidden  = true;
      }
    });

    // ── Login ─────────────────────────────────────────────────────────────
    async function tryLogin() {
      const email    = document.getElementById('u').value.trim();
      const password = document.getElementById('p').value;
      const remember = document.getElementById('remember').checked;

      document.getElementById('login-error').textContent = '';
      loginScreen.hidden = true;

      try {
        const persistence = remember
          ? firebase.auth.Auth.Persistence.LOCAL
          : firebase.auth.Auth.Persistence.SESSION;
        await auth.setPersistence(persistence);
        await auth.signInWithEmailAndPassword(email, password);
      } catch(e) {
        loginScreen.hidden = false;
        const bad = ['auth/invalid-credential','auth/wrong-password','auth/user-not-found','auth/invalid-email'];
        document.getElementById('login-error').textContent = bad.includes(e.code)
          ? 'Credenziali non valide'
          : 'Errore di accesso';
      }
    }

    document.getElementById('pw-toggle').addEventListener('click', () => {
      const input = document.getElementById('p');
      const show  = input.type === 'password';
      input.type  = show ? 'text' : 'password';
      document.getElementById('pw-toggle').textContent = show ? '🙈' : '👁';
    });

    document.getElementById('login-btn').addEventListener('click', tryLogin);
    document.getElementById('p').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
    document.getElementById('u').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    document.getElementById('gen-thumbs-btn').addEventListener('click', generateMissingThumbs);
    document.getElementById('refresh-btn').addEventListener('click', () => loadGallery());
    document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

    function compressImage(file, maxPx = 1920, quality = 0.82) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let { width, height } = img;
            if (width <= maxPx && height <= maxPx) { resolve(file); return; }
            if (width > height) { height = Math.round(height * maxPx / width); width = maxPx; }
            else                { width  = Math.round(width  * maxPx / height); height = maxPx; }
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(
              blob => resolve(new File([blob], file.name, { type: 'image/jpeg' })),
              'image/jpeg', quality
            );
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    async function generateMissingThumbs() {
      const btn = document.getElementById('gen-thumbs-btn');
      const toProcess = items.filter(i => i.type === 'image' && !i.thumbUrl);
      if (!toProcess.length) { showToast('Nessuna thumbnail mancante'); return; }

      btn.disabled = true;
      let done = 0;

      for (const item of toProcess) {
        btn.textContent = `⏳ ${done}/${toProcess.length}`;
        try {
          const resp  = await fetch(item.url);
          const blob  = await resp.blob();
          const file  = new File([blob], item.name || 'image.jpg', { type: blob.type || 'image/jpeg' });
          const thumb = await compressImage(file, 500, 0.7);

          const thumbPath = item.path
            ? 'matrimonio/thumbs/' + item.path.replace(/^matrimonio\//, '')
            : `matrimonio/thumbs/${Date.now()}_${item.name || 'img.jpg'}`;

          const snap     = await storage.ref(thumbPath).put(thumb);
          const thumbUrl = await snap.ref.getDownloadURL();

          await db.collection('uploads').doc(item.id).update({ thumbUrl, thumbPath });
          item.thumbUrl  = thumbUrl;
          item.thumbPath = thumbPath;
          done++;
        } catch(e) {
          console.error('Errore thumbnail per', item.id, e);
        }
      }

      btn.textContent = '🖼';
      btn.disabled = false;
      renderGrid();
      showToast(`${done}/${toProcess.length} thumbnail generate`);
    }

    async function loadGallery() {
      const grid = document.getElementById('admin-grid');
      try {
        const snap = await db.collection('uploads').orderBy('createdAt', 'desc').get();
        items = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      } catch(e) {
        grid.innerHTML = '<div class="admin-empty">Errore nel caricamento</div>';
        return;
      }
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('admin-grid');
      document.getElementById('admin-count').textContent = items.length + ' file';

      if (!items.length) {
        grid.innerHTML = '<div class="admin-empty">Nessun file presente</div>';
        return;
      }

      grid.innerHTML = items.map(item => `
        <div class="admin-item" id="item-${item.id}">
          ${item.type === 'image'
            ? `<img src="${item.thumbUrl || item.url}" alt="${escHtml(item.name || '')}" loading="lazy">`
            : `<video src="${item.url}" preload="none" muted playsinline data-thumb></video>
               <div class="video-tag">▶ Video</div>`}
          <div class="admin-overlay">
            <button class="delete-btn"
              data-id="${item.id}"
              data-url="${escHtml(item.url)}"
              data-path="${escHtml(item.path || '')}"
              data-thumb-path="${escHtml(item.thumbPath || '')}"
              title="Elimina" aria-label="Elimina">✕</button>
          </div>
        </div>
      `).join('');

      grid.querySelectorAll('video[data-thumb]').forEach(vid => {
        const obs = new IntersectionObserver(([entry]) => {
          if (!entry.isIntersecting) return;
          obs.unobserve(vid);
          vid.preload = 'metadata';
          vid.addEventListener('loadedmetadata', () => { vid.currentTime = 0.001; }, { once: true });
        }, { rootMargin: '200px' });
        obs.observe(vid);
      });

      grid.querySelectorAll('.admin-item').forEach((el, idx) => {
        el.addEventListener('click', () => openLb(idx));
      });

      grid.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          deleteItem(btn.dataset.id, btn.dataset.url, btn.dataset.path, btn.dataset.thumbPath);
        });
      });
    }

    const lightbox = document.getElementById('lightbox');
    const lbInner  = document.getElementById('lb-inner');
    const lbCtr    = document.getElementById('lb-counter');

    function openLb(idx) {
      lbIdx = idx;
      renderLb();
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lbInner.innerHTML = '';
    }
    function renderLb() {
      const item = items[lbIdx];
      lbInner.innerHTML = '';
      if (item.type === 'image') {
        const img = document.createElement('img');
        img.src = item.url; img.alt = item.name || 'Foto';
        lbInner.appendChild(img);
      } else {
        const vid = document.createElement('video');
        vid.src = item.url; vid.controls = true; vid.autoplay = true; vid.playsInline = true;
        lbInner.appendChild(vid);
      }
      lbCtr.textContent = `${lbIdx + 1} / ${items.length}`;
      document.getElementById('lb-prev').style.visibility = lbIdx === 0 ? 'hidden' : '';
      document.getElementById('lb-next').style.visibility = lbIdx === items.length - 1 ? 'hidden' : '';
    }

    document.getElementById('lb-close').addEventListener('click', closeLb);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLb(); });
    document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); if (lbIdx > 0) { lbIdx--; renderLb(); } });
    document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); if (lbIdx < items.length - 1) { lbIdx++; renderLb(); } });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLb();
      if (e.key === 'ArrowLeft'  && lbIdx > 0)              { lbIdx--; renderLb(); }
      if (e.key === 'ArrowRight' && lbIdx < items.length-1) { lbIdx++; renderLb(); }
    });

    let txStart = 0;
    lightbox.addEventListener('touchstart', e => { txStart = e.changedTouches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - txStart;
      if (Math.abs(dx) < 50) return;
      if (dx < 0 && lbIdx < items.length - 1) { lbIdx++; renderLb(); }
      if (dx > 0 && lbIdx > 0)                 { lbIdx--; renderLb(); }
    }, { passive: true });

    async function deleteItem(docId, url, storagePath, thumbPath) {
      if (!confirm('Eliminare questo file definitivamente?')) return;

      const el = document.getElementById(`item-${docId}`);
      if (el) el.classList.add('deleting');

      try {
        await db.collection('uploads').doc(docId).delete();

        const path = storagePath || pathFromUrl(url);
        if (path) {
          try { await storage.ref(path).delete(); } catch { /* già rimosso */ }
        }
        if (thumbPath) {
          try { await storage.ref(thumbPath).delete(); } catch { /* già rimosso */ }
        }

        items = items.filter(i => i.id !== docId);
        renderGrid();
        showToast('File eliminato');
      } catch(e) {
        console.error('Delete error:', e);
        if (el) el.classList.remove('deleting');
        showToast('Errore nell\'eliminazione');
      }
    }

    // Ricava il path Storage dall'URL di download per upload senza campo path
    function pathFromUrl(url) {
      try {
        const match = url.match(/\/o\/(.+?)\?/);
        return match ? decodeURIComponent(match[1]) : null;
      } catch { return null; }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
